<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="primeiro projeto, css e html">
    <meta name="keywords" content="html,css,design">
    <meta name="author" content="Lia Alvarez">
    <meta name="robots" content="index, follow">
    <link rel="shortcut icon" href="img/icon1.png" type="image/x-icon">
    <title>Projeto 1</title>
</head>

<body>

    <div class="profile-card">
        <div class="image">
            <img src="img/pfp.png" alt="" class="profile-img">
        </div>

        <div class="text-data">
            <span class="name">Lia Alvarez</span>
            <span class="job">Desenvolvedora & estudante</span>
        </div>

        <div class="media-buttons">
            <a href="#" class="link" style="background: #4267b2;">
                <img width="25" height="25" src="https://img.icons8.com/ios-glyphs/30/facebook-f.png"
                    alt="facebook-f" />
            </a>
            <a href="#" class="link" style="background: #1da1f2;">
                <img width="25" height="25" src="https://img.icons8.com/material/24/twitter--v2.png"
                    alt="twitter--v2" />
            </a>
            <a href="#" class="link" style="background: #e1306c;">
                <img width="25" height="25"
                    src="https://img.icons8.com/fluency-systems-regular/48/instagram-new--v1.png"
                    alt="instagram-new--v1" />
            </a>
            <a href="#" class="link" style="background: #ff0000;">
                <img width="25" height="25" src="https://img.icons8.com/ios-filled/50/youtube-play.png"
                    alt="youtube-play" />
            </a>
        </div>

        <div class="buttons">
            <button class="button">Inscreva-se </button>
            <button class="button">Mensagem</button>
        </div>

        <div class="analytics">
            <div class="data">
                <img width="24" height="24" src="https://img.icons8.com/material-outlined/24/like--v1.png"
                    alt="like--v1" />
                <span class="number">60k</span>
            </div>
            <div class="data">
                <img width="24" height="24" src="https://img.icons8.com/windows/32/speech-bubble--v1.png"
                    alt="speech-bubble--v1" />
                <span class="number">20k</span>
            </div>
            <div class="data">
                <img width="24" height="24" src="https://img.icons8.com/ios/50/forward-arrow.png" alt="forward-arrow" />
                <span class="number">12k</span>
            </div>
        </div>
    </div>
</body>

</html>
